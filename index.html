<!DOCTYPE html>
<html>
<head>
  <title>Konamew</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #EFE8E0;
      color: #4E7CB2;
    }

    .container {
      padding: 20px;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-size: 32px;
      font-weight: bold;
    }

    .status {
      font-size: 14px;
    }

    .profile {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid #94C2DA;
    }

    /* WELCOME BOX */
    .welcome {
      border: 3px solid #94C2DA;
      border-radius: 15px;
      padding: 15px;
      margin: 20px 0;
      background: white;
    }

    /* MENU */
    .menu {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .menu button {
      border: 2px solid #94C2DA;
      background: transparent;
      padding: 8px 15px;
      border-radius: 10px;
      color: #4E7CB2;
    }

    /* PORTFOLIO */
    .section-title {
      font-size: 28px;
      font-weight: bold;
      margin: 20px 0 10px;
    }

    .portfolio-box {
      height: 200px;
      border: 3px solid #94C2DA;
      border-radius: 15px;
      background: white;
    }

    /* QUEUE */
    .queue-box {
      margin-top: 20px;
      border: 3px solid #94C2DA;
      border-radius: 15px;
      padding: 15px;
      background: white;
    }

    .progress {
      margin-top: 10px;
      height: 10px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar {
      width: 70%;
      height: 100%;
      background: #4E7CB2;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="title">konamew</div>
      <div class="status">Status: open</div>
    </div>

    <img class="profile" src="https://via.placeholder.com/60">
  </div>

  <!-- WELCOME -->
  <div class="welcome">
    <p>welcome ✧</p>
    <p>i'm konamew<br>nice to mew u 🐾</p>
  </div>

  <!-- MENU -->
  <div class="menu">
    <button>HOME</button>
    <button>T.O.S</button>
    <button>PRICE</button>
    <button>CONTACT</button>
  </div>

  <!-- PORTFOLIO -->
  <div class="section-title">Portfolio</div>
  <div class="portfolio-box"></div>

  <!-- QUEUE -->
  <div class="section-title">Queue</div>
  <div class="queue-box">
    <p>Name: MXXN</p>
    <p>Service: Half body</p>
    <p>Status: rendering</p>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>
  </div>

</div>

</body>
</html>
