<!DOCTYPE html>
<html>
<head>
  <title>Konamew</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: flex-start;

      padding-top: 90px; /* 🔥 ตำแหน่งสวยกำลังดี */

      background: url("Bg.PNG") no-repeat center;
      background-size: cover;
    }

    /* 🌸 ดอกไม้ */
    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url("BgFlower.PNG") repeat;
      background-size: 180px;
      opacity: 0.35;
      pointer-events: none;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 2;
    }

    /* 💖 วงกลมพื้นหลัง */
    .circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);

      display: flex;
      justify-content: center;
      align-items: center;

      margin: auto;

      box-shadow: 0 0 60px rgba(255,150,180,0.5);
    }

    /* 👤 รูปโปรไฟล์ */
    .profile {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;

      box-shadow: 0 0 25px rgba(255,150,180,0.6);
    }

    /* 📝 text */
    .text-img {
      width: 230px;
      margin-top: 20px;
    }

    /* 🔘 ปุ่ม */
    .btn {
      margin-top: 25px;
      padding: 14px 40px;
      border-radius: 30px;
      border: none;

      background: #ff8fb1;
      color: white;
      font-size: 16px;

      box-shadow: 0 10px 25px rgba(255,150,180,0.5);
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #ff6f9d;
      transform: scale(1.05);
    }

  </style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <!-- 💖 วงกลม -->
  <div class="circle">
    <img class="profile" src="pfp2.PNG">
  </div>

  <!-- 📝 text -->
  <img class="text-img" src="text2.PNG">

  <!-- 🔘 ปุ่ม -->
  <br>
  <a href="main.html">
    <button class="btn">next</button>
  </a>

</div>

</body>
</html>
