<!DOCTYPE html>
<html>
<head>
  <title>Konamew</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      /* 🎨 พื้นหลังหลัก */
      background: url("Bg.PNG") no-repeat center;
      background-size: cover;
    }

    /* 🌸 layer ดอกไม้ */
    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url("BgFlower.PNG") repeat;
      background-size: 200px;
      opacity: 0.4;
      pointer-events: none;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 2;
    }

    /* 👤 รูปโปรไฟล์ */
    .profile {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;

      box-shadow: 0 0 40px rgba(255,150,180,0.6);
    }

    /* 📝 text PNG */
    .text-img {
      width: 220px;
      margin-top: 15px;
    }

    /* 🔘 ปุ่ม */
    .btn {
      margin-top: 20px;
      padding: 12px 35px;
      border-radius: 25px;
      border: none;
      background: #ff8fb1;
      color: white;
      font-size: 16px;

      box-shadow: 0 8px 20px rgba(255,150,180,0.5);
      cursor: pointer;
    }

    .btn:hover {
      background: #ff6f9d;
      transform: scale(1.05);
    }

  </style>
</head>

<body>

<!-- 🌸 layer -->
<div class="overlay"></div>

<div class="container">

  <!-- 👤 โปรไฟล์ -->
  <img class="profile" src="pfp2.PNG">

  <!-- 📝 text -->
  <br>
  <img class="text-img" src="text2.PNG">

  <!-- 🔘 ปุ่ม -->
  <br>
  <a href="main.html">
    <button class="btn">next</button>
  </a>

</div>

</body>
</html>
