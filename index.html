<!DOCTYPE html>
<html>
<head>
  <title>Konamew</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #C0E0FF;
      color: #253A82;
      min-height: 100vh;
    }

    .container {
      padding: 15px;
      max-width: 500px;
      margin: auto;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
    }

    .status span {
      background: #E3FC87;
      padding: 3px 8px;
      border-radius: 8px;
      font-weight: bold;
    }

    .profile {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 3px solid #AB9DFF;
    }

    /* BOX STYLE */
    .welcome,
    .portfolio-box,
    .queue-box {
      background: white;
      border: 2px solid #88A2FF;
      border-radius: 15px;
      padding: 15px;
      margin: 15px 0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .welcome span {
      color: #FFB2F7;
    }

    /* MENU */
    .menu {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 10px 0;
    }

    .menu button {
      background: #AB9DFF;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
    }

    .menu button:hover {
      background: #88A2FF;
    }

    /* TITLE */
    .section-title {
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
    }

    .queue-link {
      text-decoration: none;
      color: #253A82;
    }

    .queue-link:hover {
      color: #88A2FF;
    }

    /* PORTFOLIO */
    .portfolio-box {
      height: 180px;
      padding: 0;
      overflow: hidden;
    }

    .portfolio-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* QUEUE */
    .progress {
      margin-top: 10px;
      height: 10px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar {
      width: 70%;
      height: 100%;
      background: linear-gradient(to right, #88A2FF, #FFB2F7);
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="title">konamew</div>
      <div class="status">Status: <span>open</span></div>
    </div>

    <img class="profile" src="https://via.placeholder.com/50">
  </div>

  <!-- WELCOME -->
  <div class="welcome">
    <p><span>welcome ✧</span></p>
    <p>i'm konamew<br>nice to mew u 🐾</p>
  </div>

  <!-- MENU -->
  <div class="menu">
    <button>HOME</button>
    <button>T.O.S</button>
    <button>PRICE</button>
    <button>CONTACT</button>
  </div>

  <!-- PORTFOLIO -->
  <div class="section-title">Portfolio</div>
  <div class="portfolio-box">
    <img id="portfolio-img" src="https://via.placeholder.com/300">
  </div>

  <!-- QUEUE -->
  <div class="section-title">
    <a href="queue.html" class="queue-link">Queue →</a>
  </div>

  <div class="queue-box">
    <p>Name: MXXN</p>
    <p>Service: Half body</p>
    <p>Status: rendering</p>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>
  </div>

</div>

<!-- PORTFOLIO SLIDE -->
<script>
const images = [
  "https://via.placeholder.com/300/88A2FF",
  "https://via.placeholder.com/300/FFB2F7",
  "https://via.placeholder.com/300/AB9DFF"
];

let index = 0;

setInterval(() => {
  index = (index + 1) % images.length;
  document.getElementById("portfolio-img").src = images[index];
}, 2000);
</script>

</body>
</html>
