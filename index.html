<!DOCTYPE html>
<html>
<head>
  <title>Konamew</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: #fff0f5;
      background-image: radial-gradient(#ffc0cb 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .container {
      text-align: center;
    }

    /* PROFILE */
    .profile {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 25px rgba(255, 150, 180, 0.6);
    }

    /* NAME */
    .name {
      font-size: 32px;
      margin-top: 15px;
      color: #555;
      text-shadow: 2px 2px #ffc0cb;
    }

    .status {
      margin-top: 5px;
      color: #777;
    }

    /* BUTTON */
    .btn {
      margin-top: 20px;
      padding: 10px 30px;
      border-radius: 20px;
      border: none;
      background: #ff8fb1;
      color: white;
      font-size: 16px;
      box-shadow: 0 5px 10px rgba(255, 150, 180, 0.4);
      cursor: pointer;
    }

    .btn:hover {
      background: #ff6f9d;
    }

  </style>
</head>

<body>

<div class="container">

  <img class="profile" src="your-image.jpg">

  <div class="name">konamew</div>
  <div class="status">Commission : Open</div>

  <a href="main.html">
    <button class="btn">next</button>
  </a>

</div>

</body>
</html>
