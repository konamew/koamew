<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - konamew</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(#fff7fa,#ffeef5);
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:420px;
  padding:15px;
}

/* section */
.section{
  background:#fff;
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 8px 25px rgba(255,182,193,0.25);
}

.section h3{
  margin-bottom:8px;
  color:#d98194;
}

.section p{
  font-size:14px;
  color:#555;
  line-height:1.6;
}
.contact-btn{
  display:block;
  margin-top:12px;
  padding:12px;
  border-radius:20px;
  text-align:center;
  text-decoration:none;

  background: linear-gradient(135deg,#ffdbe5,#cfe8ff);
  color:#b96b85;
  font-weight:600;

  box-shadow:0 6px 20px rgba(255,182,193,0.35);
  transition:0.25s;
}

 .contact-btn:first-of-type{
  background: linear-gradient(135deg,#ff8fab,#ffb3c6);
  color:#fff;
  font-weight:700;
  transform:scale(1.05);
  box-shadow:0 10px 30px rgba(255,105,135,0.4);
}

.contact-btn:hover{
  transform:translateY(-2px);
  background: linear-gradient(135deg,#ffc6d6,#bfe0ff);
}

.contact-btn:first-of-type{
  background: linear-gradient(135deg,#ff8fab,#ffb3c6);
  color:#fff;
  box-shadow:0 8px 25px rgba(255,105,135,0.35);
}

.contact-btn:first-of-type:hover{
  transform:scale(1.08);

</style>
</head>

<body>

<div class="container">

<!-- 👇 สำคัญมาก -->
<div id="header"></div>

<div class="section">
  <h3>Contact</h3>
  <p>Feel free to reach out anytime!</p>

  <a href="https://vgen.co/konamew" class="contact-btn">Order Commission</a>

  <a href="https://instagram.com/konamew" class="contact-btn">Instagram</a>
  <a href="mailto:work.konamew@email.com" class="contact-btn">Email</a>
  <a href="https://discord.com/users/konamew" class="contact-btn">Discord</a>

  <a href="https://tiktok.com/@konamew" class="contact-btn">TikTok</a>
</div>

<!-- script ต้องอยู่ล่าง -->
<script>
fetch("header.html")
.then(res => res.text())
.then(data => {
  document.getElementById("header").innerHTML = data;
});
</script>

</body>
</html>
