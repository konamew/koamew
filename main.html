<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>konamew</title>

<style>
/* 🌸 RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html{
  scroll-behavior:smooth;
}

body{
  background: linear-gradient(#fff7fa,#ffeef5);
  display:flex;
  justify-content:center;
}

/* 💖 จำกัดความกว้าง (แก้ปัญหาคอมโล่ง) */
.container{
  width:100%;
  max-width:420px;
  padding:15px;
}

/* 🌸 HEADER */
.header{
  background:#d98194;
  border-radius:20px;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 6px 20px rgba(255,182,193,0.4);
}

.header img{
  height:40px;
}

/* 🌈 WELCOME */
.welcome{
  margin-top:15px;
}

.welcome img{
  width:100%;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(255,182,193,0.4);
}

/* 🎀 MENU */
.menu{
  display:flex;
  justify-content:space-between;
  margin:15px 0;
}

.menu button{
  flex:1;
  margin:5px;
  padding:10px;
  border-radius:20px;
  border:2px solid #e6a6b3;
  background:white;
  color:#d98194;
  font-weight:bold;
  transition:0.2s;
}

.menu button:hover{
  background:#ffdbe5;
  transform:translateY(-3px);
}

.menu button:active{
  transform:scale(0.95);
}

/* ✨ PORTFOLIO */
.section-title{
  font-size:24px;
  margin:20px 0 10px;
  color:#6b5b5b;
}

.slider{
  position:relative;
  width:100%;
  height:250px;
  overflow:hidden;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(255,182,193,0.4);
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:opacity 0.6s;
}

.slide.active{
  opacity:1;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ปุ่มสไลด์ */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:white;
  border:none;
  border-radius:50%;
  width:35px;
  height:35px;
  opacity:0.8;
}

.prev{ left:10px;}
.next{ right:10px;}

/* 💖 QUEUE */
.card{
  background:white;
  padding:15px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(255,182,193,0.3);
  position:relative;
}

.queue-tag{
  position:absolute;
  right:10px;
  top:10px;
  background:#ffeaa7;
  padding:5px 10px;
  border-radius:10px;
  font-size:14px;
}

.progress{
  height:8px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress-bar{
  width:70%;
  height:100%;
  background:linear-gradient(to right,#ff9eb5,#8fbaff);
}

/* ✨ sparkle hover */
button:hover::after{
  content:"✨";
  position:absolute;
  animation:sparkle 1s infinite;
}

@keyframes sparkle{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

/* 🌸 floating flowers */
body::before{
  content:"🌸";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  opacity:0.1;
  animation:float 20s linear infinite;
  pointer-events:none;
}

@keyframes float{
  0%{transform:translateY(0);}
  100%{transform:translateY(-100px);}
}

/* 💻 Desktop ปรับนิดเดียว */
@media(min-width:768px){
  .container{
    max-width:600px;
  }

  .slider{
    height:320px;
  }
}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <img src="logokonamew.PNG">
  <img src="logocat.PNG">
</div>

<!-- WELCOME -->
<div class="welcome">
  <img src="bgwelcome.PNG">
</div>

<!-- MENU -->
<div class="menu">
  <button>Home</button>
  <button>T.O.S</button>
  <button>Price</button>
  <button>Contact</button>
</div>

<!-- PORTFOLIO -->
<div class="section-title">Portfolio</div>

<div class="slider">
  <div class="slide active"><img src="P1.JPG"></div>
  <div class="slide"><img src="P2.jpg"></div>
  <div class="slide"><img src="P3.JPG"></div>
  <div class="slide"><img src="P4.JPG"></div>

  <button class="nav prev" onclick="prev()">‹</button>
  <button class="nav next" onclick="next()">›</button>
</div>

<!-- QUEUE -->
<div class="section-title">Queue</div>

<div class="card">
  <div class="queue-tag">Queue 1</div>

  <h3>Client <span style="color:#d98194">Vgen</span></h3>
  <p>Service : head shot</p>
  <p style="color:#d98194">Progress : done</p>

  <div class="progress">
    <div class="progress-bar"></div>
  </div>
</div>

</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

function next(){
  index = (index+1)%slides.length;
  showSlide(index);
}

function prev(){
  index = (index-1+slides.length)%slides.length;
  showSlide(index);
}

/* auto slide */
setInterval(next,4000);
</script>

</body>
</html>
