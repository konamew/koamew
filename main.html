<!DOCTYPE html>
<html>
<head>
  <title>Konamew</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #fff7fa, #ffeef5);
  overflow-x: hidden;
}

/* 💻 CENTER LAYOUT */
.container {
  max-width: 500px;
  margin: auto;
}

/* 🌸 FLOWERS */
.flowers {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

.flowers img {
  position: absolute;
  width: 20px;
  opacity: 0.4;
  animation: float 12s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); }
  100% { transform: translateY(-10vh) rotate(360deg); }
}

/* ✨ SPARKLE */
.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 10px white;
  animation: sparkle 2s infinite ease-in-out;
}

@keyframes sparkle {
  0%,100% { opacity: 0; }
  50% { opacity: 1; }
}

/* HEADER */
.header {
  background: #f29bb2;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1;
  position: relative;
}

.logo { height: 45px; }
.cat { height: 35px; }

/* WELCOME */
.welcome-box {
  margin: 15px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}

.welcome-bg { width: 100%; }
.welcome-text {
  position: absolute;
  top: 10px;
  left: 15px;
  width: 200px;
}

/* MENU */
.menu {
  display: flex;
  justify-content: space-around;
  margin: 15px;
}

.menu button {
  border: 2px solid #f4a6b8;
  background: white;
  border-radius: 25px;
  padding: 8px 16px;
  color: #e07a96;
  font-weight: bold;
  transition: 0.2s;
}

.menu button:hover {
  transform: scale(1.1);
  background: #ffe4ec;
}

h2 {
  margin: 15px;
  color: #7a5a62;
}

/* 🎠 SLIDER */
.slider {
  margin: 15px;
  border-radius: 20px;
  overflow: hidden;
  height: 260px;
  position: relative;
}

.slider img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  opacity: 0;
  transition: 0.6s;
}

.slider img.active {
  opacity: 1;
}

/* 🔥 NAV BUTTON */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.7);
  border: none;
  font-size: 22px;
  padding: 5px 10px;
  border-radius: 50%;
  cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

/* QUEUE */
.card {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(255,180,200,0.4);
  position: relative;
}

.badge {
  position: absolute;
  right: 10px;
  top: -10px;
  background: #ffe8a3;
  padding: 10px;
  border-radius: 12px;
}

.badge span {
  color: #ff6fa0;
  font-size: 20px;
}

.progress {
  height: 10px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 70%;
  background: linear-gradient(to right, #ff9ab5, #a5c8ff);
}

</style>
</head>

<body>

<!-- 🌸 BACKGROUND EFFECT -->
<div class="flowers">
  <img src="BgFlower.PNG" style="left:10%;">
  <img src="BgFlower.PNG" style="left:60%;">
  <div class="sparkle" style="top:30%; left:50%;"></div>
</div>

<div class="container">

<!-- HEADER -->
<div class="header">
  <img src="logokonamew.PNG" class="logo">
  <img src="logocat.PNG" class="cat">
</div>

<!-- WELCOME -->
<div class="welcome-box">
  <img src="bgwelcome.PNG" class="welcome-bg">
  <img src="welcome.PNG" class="welcome-text">
</div>

<!-- MENU -->
<div class="menu">
  <button>Home</button>
  <button>T.O.S</button>
  <button>Price</button>
  <button>Contact</button>
</div>

<!-- PORTFOLIO -->
<h2>Portfolio</h2>

<div class="slider">
  <button class="nav prev" onclick="prevSlide()">‹</button>

  <img src="P1.JPG" class="active">
  <img src="P2.jpg">
  <img src="P3.JPG">
  <img src="P4.JPG">

  <button class="nav next" onclick="nextSlide()">›</button>
</div>

<!-- QUEUE -->
<h2>Queue</h2>

<div class="card">
  <div class="badge">
    Queue<br><span>1</span>
  </div>

  <h3>Client <span style="color:#e3a3b0;">Vgen</span></h3>
  <p>Service : head shot</p>
  <p style="color:#e3a3b0;">Progress : done</p>

  <div class="progress">
    <div class="progress-bar"></div>
  </div>
</div>

</div>

<!-- 🎠 SCRIPT -->
<script>
let slides = document.querySelectorAll(".slider img");
let index = 0;

function showSlide(i){
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
}

function nextSlide(){
  index = (index + 1) % slides.length;
  showSlide(index);
}

function prevSlide(){
  index = (index - 1 + slides.length) % slides.length;
  showSlide(index);
}

setInterval(nextSlide, 3000);
</script>

</body>
</html>
