<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>konamew</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background: linear-gradient(#fff7fa,#ffeef5);
  display:flex;
  justify-content:center;
}

/* container */
.container{
  width:100%;
  max-width:420px;
  padding:15px;
}

/* header */
.header{
  background:#d98194;
  border-radius:20px;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 8px 25px rgba(255,182,193,0.4);
}

.header img{ height:40px; }

/* welcome */
.welcome img{
  width:100%;
  border-radius:20px;
  margin-top:15px;
  box-shadow:0 10px 30px rgba(255,182,193,0.4);
}

/* MENU */
.menu{
  display:flex;
  gap:10px;
  margin:15px 0;
}

.menu button{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background: linear-gradient(135deg,#fff,#fff0f5);
  color:#d98194;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(255,182,193,0.3);
  transition:0.25s;
  position:relative;
}

.menu button:active{
  background: linear-gradient(135deg,#ffd6e5,#d6e8ff);
  transform:scale(0.95);
}

/* sparkle */
.menu button:hover::after{
  content:"✨";
  position:absolute;
  right:8px;
  top:-5px;
  animation:sparkle 1s infinite;
}

@keyframes sparkle{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

/* title */
.section-title{
  font-size:26px;
  font-weight:800;
  margin:20px 0 10px;
  color:#6b5b5b;
}

/* slider */
.slider{
  position:relative;
  height:260px;
  overflow:hidden;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(255,182,193,0.4);
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:0.5s;
}

.slide.active{ opacity:1; }

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  cursor:pointer;
}

/* nav */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:white;
  border:none;
  border-radius:50%;
  width:35px;
  height:35px;
}

.prev{ left:10px;}
.next{ right:10px;}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(8px);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup img{
  max-width:90%;
  max-height:80%;
  border-radius:20px;
  animation:zoom 0.3s;
}

@keyframes zoom{
  from{transform:scale(0.8); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

/* queue */
.queue-card{
  position:relative;
  background:#ffffff;
  border-radius:25px;
  padding:18px;
  margin-top:10px;

  box-shadow:
    0 10px 30px rgba(255,182,193,0.35),
    inset 0 1px 5px rgba(255,255,255,0.6);
}

.queue-badge{
  position:absolute;
  right:15px;
  top:15px;

  background: linear-gradient(#ffeaa7,#ffd6f1);
  border-radius:15px;
  padding:8px 12px;
}

.client{
  font-size:22px;
  font-weight:bold;
}

.client span{
  color:#e89aac;
  margin-left:5px;
}

.progress-bar{
  height:10px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

/* shimmer progress */
.progress-fill{
  width:70%;
  height:100%;
  background: linear-gradient(90deg,#ff9eb5,#c9b6ff,#8ec5ff);
  border-radius:10px;
  position:relative;
  overflow:hidden;

  box-shadow:
    0 0 12px rgba(255,182,193,0.7),
    0 0 20px rgba(173,216,230,0.6);
}

.progress-fill::after{
  content:"";
  position:absolute;
  top:0;
  left:-60%;
  width:60%;
  height:100%;

  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.85),
    transparent
  );

  animation: shimmer 2.5s infinite;
}

@keyframes shimmer{
  0%{ left:-60%; }
  100%{ left:120%; }
}

/* 🌸 flower (background only) */
.flower{
  position:fixed;
  top:-20px;
  font-size:18px;
  animation:fall linear infinite;
  pointer-events:none;
  z-index:-1;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(360deg);
  }
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <img src="logokonamew.PNG">
  <img src="logocat.PNG">
</div>

<div class="welcome">
  <img src="bgwelcome.PNG">
</div>

<div class="menu">
  <button>Home</button>
  <button>T.O.S</button>
  <button>Price</button>
  <button>Contact</button>
</div>

<div class="section-title">Portfolio</div>

<div class="slider">
  <div class="slide active"><img src="P1.JPG" onclick="openPopup(0)"></div>
  <div class="slide"><img src="P2.jpg" onclick="openPopup(1)"></div>
  <div class="slide"><img src="P3.JPG" onclick="openPopup(2)"></div>
  <div class="slide"><img src="P4.JPG" onclick="openPopup(3)"></div>

  <button class="nav prev" onclick="prev()">‹</button>
  <button class="nav next" onclick="next()">›</button>
</div>

<div class="section-title">Queue</div>

<div class="queue-card">

  <div class="queue-badge">
    <span>Queue</span>
    <b>1</b>
  </div>

  <h3 class="client">
    Client <span>Vgen</span>
  </h3>

  <p>Service : head shot</p>
  <p style="color:#e89aac;">Progress : done</p>

  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>

</div>

</div>

<!-- popup -->
<div class="popup" id="popup" onclick="closePopup()">
  <button onclick="prevPopup(event)" style="position:absolute;left:10px;">‹</button>
  <img id="popupImg">
  <button onclick="nextPopup(event)" style="position:absolute;right:10px;">›</button>
</div>

<script>

let index=0;
const slides=document.querySelectorAll(".slide");

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

function next(){
  index=(index+1)%slides.length;
  showSlide(index);
}

function prev(){
  index=(index-1+slides.length)%slides.length;
  showSlide(index);
}

setInterval(next,4000);

/* popup gallery */
let popupIndex=0;
const imgs=document.querySelectorAll(".slide img");

function openPopup(i){
  popupIndex=i;
  document.getElementById("popup").style.display="flex";
  document.getElementById("popupImg").src=imgs[i].src;
}

function nextPopup(e){
  e.stopPropagation();
  popupIndex=(popupIndex+1)%imgs.length;
  document.getElementById("popupImg").src=imgs[popupIndex].src;
}

function prevPopup(e){
  e.stopPropagation();
  popupIndex=(popupIndex-1+imgs.length)%imgs.length;
  document.getElementById("popupImg").src=imgs[popupIndex].src;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* 🌸 flower */
setInterval(()=>{
  const f=document.createElement("div");
  f.className="flower";
  f.innerText="🌸";
  f.style.left=Math.random()*100+"vw";
  f.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(f);

  setTimeout(()=>f.remove(),10000);
},700);

</script>

</body>
</html>
