<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konamew</title>

<style>
/* 🌸 RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

/* 🌸 BODY + THEME */
body {
  background: linear-gradient(to bottom, #fff5f8, #ffeaf1);
  display: flex;
  justify-content: center;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 🌸 CONTAINER (แก้คอมโล่ง) */
.container {
  width: 100%;
  max-width: 700px;
  padding: 20px;
  padding-bottom: 60px;
}

/* 🌸 HEADER */
.header {
  background: #d97b8d;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* 🌸 WELCOME */
.welcome {
  margin: 15px 0;
}

.welcome img {
  width: 100%;
  border-radius: 15px;
  box-shadow: 0 10px 20px rgba(255,150,180,0.2);
}

/* 🌸 MENU */
.menu {
  display: flex;
  justify-content: space-between;
  margin: 15px 0;
  flex-wrap: wrap;
  gap: 10px;
}

.menu button {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: 2px solid #eaa1b0;
  background: white;
  color: #c97b8c;
  font-weight: bold;
  transition: 0.3s;
}

.menu button:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 5px 15px rgba(255,150,180,0.4);
}

/* 🌸 SECTION */
h2 {
  margin: 20px 0 10px;
  color: #6e5a5f;
}

/* 🌸 SLIDER */
.slider {
  position: relative;
  width: 100%;
  height: 280px;
  overflow: hidden;
  border-radius: 20px;
}

.slider img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  opacity: 0;
  transition: opacity 0.6s;
}

.slider img.active {
  opacity: 1;
}

/* 🌸 NAV */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.8);
  border: none;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

/* 🌸 CARD */
.card {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(255,150,180,0.2);
  position: relative;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* 🌸 QUEUE BOX */
.queue-box {
  position: absolute;
  right: 10px;
  top: -10px;
  background: #f3df9c;
  padding: 10px;
  border-radius: 10px;
}

/* 🌸 PROGRESS */
.progress {
  margin-top: 10px;
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  width: 70%;
  height: 100%;
  background: linear-gradient(to right, #ff9ab5, #9ab6ff);
}

/* ✨ SPARKLE BACKGROUND */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 80px 80px;
  opacity: 0.15;
  animation: sparkleMove 20s linear infinite;
}

@keyframes sparkleMove {
  from { transform: translateY(0); }
  to { transform: translateY(-80px); }
}

/* 🌸 FLOWER FLOAT */
body::before {
  content: "🌸";
  position: fixed;
  width: 100%;
  top: -50px;
  font-size: 18px;
  opacity: 0.25;
  animation: fall 15s linear infinite;
  pointer-events: none;
}

@keyframes fall {
  0% { transform: translateY(-50px) rotate(0deg); }
  100% { transform: translateY(100vh) rotate(360deg); }
}

/* ✨ SPARKLE FOLLOW MOUSE */
.sparkle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  animation: fade 1s forwards;
}

@keyframes fade {
  to {
    opacity: 0;
    transform: scale(2);
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img src="logokonamew.PNG" height="40">
    <img src="logocat.PNG" height="40">
  </div>

  <!-- WELCOME -->
  <div class="welcome">
    <img src="bgwelcome.PNG">
  </div>

  <!-- MENU -->
  <div class="menu">
    <button>Home</button>
    <button>T.O.S</button>
    <button>Price</button>
    <button>Contact</button>
  </div>

  <!-- PORTFOLIO -->
  <h2>Portfolio</h2>
  <div class="slider">
    <img src="P1.JPG" class="active">
    <img src="P2.jpg">
    <img src="P3.JPG">
    <img src="P4.JPG">

    <button class="nav prev" onclick="prevSlide()">‹</button>
    <button class="nav next" onclick="nextSlide()">›</button>
  </div>

  <!-- QUEUE -->
  <h2>Queue</h2>
  <div class="card">
    <div class="queue-box">Queue 1</div>
    <h3>Client <span style="color:#eaa1b0;">Vgen</span></h3>
    <p>Service : head shot</p>
    <p style="color:#eaa1b0;">Progress : done</p>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>
  </div>

</div>

<script>
/* 🎞 SLIDER */
let index = 0;
const slides = document.querySelectorAll(".slider img");

function showSlide(i){
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
}

function nextSlide(){
  index = (index + 1) % slides.length;
  showSlide(index);
}

function prevSlide(){
  index = (index - 1 + slides.length) % slides.length;
  showSlide(index);
}

setInterval(nextSlide, 3000);

/* ✨ SPARKLE FOLLOW MOUSE */
document.addEventListener("mousemove", e => {
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = e.clientX + "px";
  s.style.top = e.clientY + "px";
  document.body.appendChild(s);

  setTimeout(() => s.remove(), 1000);
});
</script>

</body>
</html>
