<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>konamew</title>

<style>

/* 🌸 RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html{
  scroll-behavior:smooth;
}

body{
  background: linear-gradient(#fff7fa,#ffeef5);
  display:flex;
  justify-content:center;
}

/* 💖 CONTAINER (แก้คอมโล่ง) */
.container{
  width:100%;
  max-width:420px;
  padding:15px;
}

/* 🌸 HEADER */
.header{
  background:#d98194;
  border-radius:20px;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 8px 25px rgba(255,182,193,0.4);
}

.header img{
  height:40px;
}

/* 🌈 WELCOME */
.welcome{
  margin-top:15px;
}

.welcome img{
  width:100%;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(255,182,193,0.4);
}

/* 🎀 MENU */
.menu{
  display:flex;
  justify-content:space-between;
  margin:15px 0;
}

.menu button{
  flex:1;
  margin:5px;
  padding:10px;
  border-radius:20px;
  border:2px solid #e6a6b3;
  background:white;
  color:#d98194;
  font-weight:bold;
  transition:0.25s;
  position:relative;
}

.menu button:hover{
  background:#ffdbe5;
  transform:translateY(-3px);
  box-shadow:0 5px 15px rgba(255,182,193,0.4);
}

.menu button:active{
  transform:scale(0.95);
}

/* ✨ sparkle */
.menu button:hover::after{
  content:"✨";
  position:absolute;
  right:8px;
  top:-5px;
  font-size:14px;
  animation:sparkle 1s infinite;
}

@keyframes sparkle{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

/* 🌸 TITLE */
.section-title{
  font-size:24px;
  margin:20px 0 10px;
  color:#6b5b5b;
}

/* 🎨 SLIDER */
.slider{
  position:relative;
  width:100%;
  height:260px;
  overflow:hidden;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(255,182,193,0.4);
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:opacity 0.6s;
}

.slide.active{
  opacity:1;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ปุ่ม slider */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:white;
  border:none;
  border-radius:50%;
  width:35px;
  height:35px;
  opacity:0.8;
}

.prev{ left:10px;}
.next{ right:10px;}

/* 💖 QUEUE CARD (เวอร์ชันสวยตามแบบคุณ) */
.queue-card{
  position:relative;
  background: linear-gradient(145deg,#fff,#fff5f8);
  border-radius:25px;
  padding:18px;
  margin-top:10px;

  box-shadow:
    0 10px 30px rgba(255,182,193,0.35),
    inset 0 1px 5px rgba(255,255,255,0.6);

  transition:0.3s;
}

.queue-card:hover{
  transform: translateY(-5px);
  box-shadow:
    0 15px 40px rgba(255,182,193,0.5);
}

/* glow overlay */
.queue-card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:25px;
  background: radial-gradient(circle at top left, rgba(255,200,220,0.3), transparent);
  pointer-events:none;
}

/* badge */
.queue-badge{
  position:absolute;
  right:10px;
  top:10px;

  background: linear-gradient(145deg,#ffeaa7,#ffd6f1);
  border-radius:15px;
  padding:8px 12px;

  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.queue-badge span{
  display:block;
  font-size:12px;
  color:#7a6a6a;
}

.queue-badge b{
  font-size:22px;
  color:#ff6fa5;
}

/* text */
.client{
  font-size:22px;
  font-weight:bold;
}

.client span{
  color:#e89aac;
  font-size:16px;
  margin-left:5px;
}

.service{
  margin-top:5px;
}

.progress-text{
  margin-top:5px;
  color:#e89aac;
}

/* progress */
.progress-bar{
  height:10px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress-fill{
  width:70%;
  height:100%;
  background: linear-gradient(90deg,#ff9eb5,#c9b6ff,#8ec5ff);
  border-radius:10px;
  box-shadow:0 0 10px rgba(255,182,193,0.6);

  position:relative;
  overflow:hidden;
}

.progress-fill::after{
  content:"";
  position:absolute;
  top:0;
  left:-50%;
  width:50%;
  height:100%;

animation: shimmerMove 2s infinite;
}

@keyframes shimmerMove{
  0%{ left:-50%; }
  100%{ left:120%; }
}

  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.5),
    transparent
  );

  animation: shimmerMove 2s infinite;
}

@keyframes shimmerMove{
  0%{ left:-50%; }
  100%{ left:120%; }
}

/* 🌸 floating background */
body::before{
  content:"🌸 ";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  opacity:0.08;
  animation:float 10s linear infinite;
  pointer-events:none;
}

@keyframes float{
  0%{transform:translateY(0);}
  100%{transform:translateY(-100px);}
}

/* 💻 DESKTOP */
@media(min-width:768px){
  .container{
    max-width:600px;
  }

  .slider{
    height:320px;
  }
}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <img src="logokonamew.PNG">
  <img src="logocat.PNG">
</div>

<!-- WELCOME -->
<div class="welcome">
  <img src="bgwelcome.PNG">
</div>

<!-- MENU -->
<div class="menu">
  <button>Home</button>
  <button>T.O.S</button>
  <button>Price</button>
  <button>Contact</button>
</div>

<!-- PORTFOLIO -->
<div class="section-title">Portfolio</div>

<div class="slider">
  <div class="slide active"><img src="P1.JPG"></div>
  <div class="slide"><img src="P2.jpg"></div>
  <div class="slide"><img src="P3.JPG"></div>
  <div class="slide"><img src="P4.JPG"></div>

  <button class="nav prev" onclick="prev()">‹</button>
  <button class="nav next" onclick="next()">›</button>
</div>

<!-- QUEUE -->
<div class="section-title">Queue</div>

<div class="queue-card">

  <div class="queue-badge">
    <span>Queue</span>
    <b>1</b>
  </div>

  <h3 class="client">
    Client <span>Vgen</span>
  </h3>

  <p class="service">Service : head shot</p>
  <p class="progress-text">Progress : done</p>

  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>

</div>

</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

function next(){
  index = (index+1)%slides.length;
  showSlide(index);
}

function prev(){
  index = (index-1+slides.length)%slides.length;
  showSlide(index);
}

setInterval(next,4000);
</script>

</body>
</html>
