<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>konamew</title>

<style>

/* 🌸 RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background: linear-gradient(#fff7fa,#ffeef5);
  display:flex;
  justify-content:center;
}

/* 💖 CONTAINER */
.container{
  width:100%;
  max-width:420px;
  padding:15px;
}

/* 🌸 HEADER */
.header{
  background:#d98194;
  border-radius:20px;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 8px 25px rgba(255,182,193,0.4);
}

.header img{
  height:40px;
}

/* 🌈 WELCOME */
.welcome img{
  width:100%;
  border-radius:20px;
  margin-top:15px;
  box-shadow:0 10px 30px rgba(255,182,193,0.4);
}

/* 🎀 MENU (นุ่ม ไม่มีขอบ + 2 สี) */
.menu{
  display:flex;
  margin:15px 0;
}

.menu button{
  flex:1;
  margin:5px;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#fff;
  color:#d98194;
  font-weight:bold;

  box-shadow:0 5px 15px rgba(255,182,193,0.25);
  transition:0.25s;
}

.menu button:hover{
  background: linear-gradient(135deg,#ffdbe5,#d6ecff);
  transform:translateY(-2px);
}

/* ✨ TITLE */
.section-title{
  font-size:24px;
  font-weight:700;
  margin:20px 0 10px;
  color:#6b5b5b;
}

/* 🎨 SLIDER */
.slider{
  position:relative;
  height:260px;
  overflow:hidden;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(255,182,193,0.4);
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:0.5s;
}

.slide.active{opacity:1;}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  cursor:pointer;
}

/* ปุ่ม */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:white;
  border:none;
  border-radius:50%;
  width:35px;
  height:35px;
}

.prev{left:10px;}
.next{right:10px;}

/* 💖 QUEUE CARD */
.queue-card{
  position:relative;
  background:#ffffff;
  border-radius:20px;
  padding:18px;
  margin-top:15px;

  box-shadow:0 8px 25px rgba(255,182,193,0.25);
}

/* 🌟 BADGE = แบบในรูปคุณ */
.queue-badge{
  position:absolute;
  right:12px;
  top:12px;

  background: linear-gradient(145deg,#ffeaa7,#ffd6f1);
  border-radius:18px;
  padding:10px 14px;

  text-align:center;

  box-shadow:
    0 10px 25px rgba(255,182,193,0.4),
    inset 0 2px 5px rgba(255,255,255,0.6);
}

.queue-badge span{
  display:block;
  font-size:12px;
  color:#7a6a6a;
}

.queue-badge b{
  display:block;
  font-size:24px;
  font-weight:800;
  color:#ff5c9c;
}

/* text */
.client{
  font-size:22px;
  font-weight:700;
}

.client span{
  color:#e89aac;
}

/* progress */
.progress-bar{
  height:8px;
  background:#eaeaea;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress-fill{
  width:70%;
  height:100%;
  background: linear-gradient(90deg,#ff9eb5,#c9b6ff,#8ec5ff);
  border-radius:10px;
  position:relative;
  overflow:hidden;
}

/* ✨ shimmer */
.progress-fill::after{
  content:"";
  position:absolute;
  top:0;
  left:-60%;
  width:60%;
  height:100%;

  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.8),
    transparent
  );

  animation: shimmer 2.5s infinite;
}

@keyframes shimmer{
  0%{ left:-60%; }
  100%{ left:120%; }
}

/* 🌸 ดอกไม้หลังสุด */
.flower{
  position:fixed;
  top:-20px;
  font-size:18px;
  animation:fall linear infinite;
  pointer-events:none;
  z-index:-1;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(360deg);
  }
}

/* 🌙 POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup img{
  max-width:90%;
  border-radius:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <img src="logokonamew.PNG">
  <img src="logocat.PNG">
</div>

<div class="welcome">
  <img src="bgwelcome.PNG">
</div>

<div class="menu">
  <button>Home</button>
  <button>T.O.S</button>
  <button>Price</button>
  <button>Contact</button>
</div>

<div class="section-title">Portfolio</div>

<div class="slider">
  <div class="slide active"><img src="P1.JPG" onclick="openPopup(this.src)"></div>
  <div class="slide"><img src="P2.jpg" onclick="openPopup(this.src)"></div>
  <div class="slide"><img src="P3.JPG" onclick="openPopup(this.src)"></div>
  <div class="slide"><img src="P4.JPG" onclick="openPopup(this.src)"></div>

  <button class="nav prev" onclick="prev()">‹</button>
  <button class="nav next" onclick="next()">›</button>
</div>

<div class="section-title">Queue</div>

<div class="queue-card">

  <div class="queue-badge">
    <span>Queue</span>
    <b>1</b>
  </div>

  <h3 class="client">Client <span>Vgen</span></h3>
  <p>Service : head shot</p>
  <p style="color:#e89aac;">Progress : done</p>

  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>

</div>

</div>

<!-- popup -->
<div class="popup" id="popup" onclick="closePopup()">
  <img id="popup-img">
</div>

<script>

/* slider */
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

function next(){
  index = (index+1)%slides.length;
  showSlide(index);
}

function prev(){
  index = (index-1+slides.length)%slides.length;
  showSlide(index);
}

setInterval(next,4000);

/* popup */
function openPopup(src){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popup-img").src=src;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* 🌸 ดอกไม้ */
for(let i=0;i<10;i++){
  let f=document.createElement("div");
  f.className="flower";
  f.innerHTML="🌸";
  f.style.left=Math.random()*100+"vw";
  f.style.animationDuration=5+Math.random()*5+"s";
  document.body.appendChild(f);
}

</script>

</body>
</html>
