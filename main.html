<!DOCTYPE html>
<html>
<head>
  <title>Konamew</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #fff7fa, #ffeef5);
  overflow-x: hidden;
}

/* 🌸 FLOWERS */
.flowers {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  top: 0;
  left: 0;
  z-index: 0;
}

.flowers img {
  position: absolute;
  width: 20px;
  opacity: 0.6;
  animation: float 12s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); }
  100% { transform: translateY(-10vh) rotate(360deg); }
}

/* ✨ SPARKLE */
.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 10px white;
  animation: sparkle 2s infinite ease-in-out;
}

@keyframes sparkle {
  0%,100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* HEADER */
.header {
  background: #f29bb2;
  padding: 12px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 15px rgba(255,150,180,0.4);
  position: relative;
  z-index: 1;
}

.logo { height: 45px; }
.cat { height: 35px; }

/* WELCOME */
.welcome-box {
  margin: 15px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 10px 25px rgba(255,180,200,0.4);
  z-index: 1;
}

.welcome-bg {
  width: 100%;
  display: block;
}

.welcome-text {
  position: absolute;
  top: 12px;
  left: 15px;
  width: 200px;
}

/* MENU */
.menu {
  display: flex;
  justify-content: space-around;
  margin: 15px 10px 25px;
  position: relative;
  z-index: 1;
}

.menu button {
  border: 2px solid #f4a6b8;
  background: #fff;
  border-radius: 25px;
  padding: 8px 16px;
  color: #e07a96;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(255,180,200,0.3);
  transition: 0.2s;
}

.menu button:hover {
  transform: scale(1.1);
  background: #ffe4ec;
}

/* TITLE */
h2 {
  margin: 15px;
  color: #7a5a62;
  position: relative;
  z-index: 1;
}

/* SLIDER */
.slider {
  margin: 15px;
  border-radius: 20px;
  overflow: hidden;
  height: 260px;
  position: relative;
  box-shadow: 0 10px 25px rgba(255,180,200,0.4);
  z-index: 1;
}

.slider img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  opacity: 0;
  transition: opacity 0.6s ease;
}

.slider img.active {
  opacity: 1;
}

/* QUEUE */
.card {
  background: #fff;
  margin: 15px;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(255,180,200,0.4);
  position: relative;
  z-index: 1;
}

.badge {
  position: absolute;
  right: 10px;
  top: -10px;
  background: #ffe8a3;
  padding: 10px;
  border-radius: 12px;
  text-align: center;
}

.badge span {
  font-size: 20px;
  color: #ff6fa0;
}

.progress {
  height: 10px;
  background: #eee;
  border-radius: 10px;
  margin-top: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 70%;
  background: linear-gradient(to right, #ff9ab5, #a5c8ff);
}
</style>
</head>

<body>

<!-- 🌸 FLOWERS -->
<div class="flowers">
  <img src="BgFlower.PNG" style="left:10%; animation-delay:0s;">
  <img src="BgFlower.PNG" style="left:30%; animation-delay:3s;">
  <img src="BgFlower.PNG" style="left:60%; animation-delay:6s;">
  <img src="BgFlower.PNG" style="left:80%; animation-delay:2s;">

  <div class="sparkle" style="top:20%; left:40%;"></div>
  <div class="sparkle" style="top:60%; left:70%;"></div>
  <div class="sparkle" style="top:40%; left:20%;"></div>
</div>

<!-- HEADER -->
<div class="header">
  <img src="logokonamew.PNG" class="logo">
  <img src="logocat.PNG" class="cat">
</div>

<!-- WELCOME -->
<div class="welcome-box">
  <img src="bgwelcome.PNG" class="welcome-bg">
  <img src="welcome.PNG" class="welcome-text">
</div>

<!-- MENU -->
<div class="menu">
  <button>Home</button>
  <button>T.O.S</button>
  <button>Price</button>
  <button>Contact</button>
</div>

<!-- PORTFOLIO -->
<h2>Portfolio</h2>

<div class="slider">
  <img src="P1.JPG" class="active">
  <img src="P2.jpg">
  <img src="P3.JPG">
  <img src="P4.JPG">
</div>

<!-- QUEUE -->
<h2>Queue</h2>

<div class="card">
  <div class="badge">
    Queue<br><span>1</span>
  </div>

  <h3>Client <span style="color:#e3a3b0;">Vgen</span></h3>
  <p>Service : head shot</p>
  <p style="color:#e3a3b0;">Progress : done</p>

  <div class="progress">
    <div class="progress-bar"></div>
  </div>
</div>

<!-- AUTO SLIDE -->
<script>
let slides = document.querySelectorAll(".slider img");
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 3000);
</script>

</body>
</html>
