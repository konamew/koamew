<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konamew</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f7f2f4;
}

/* ===== TOP BAR ===== */
.topbar {
  background: #f49ab0;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  height: 40px;
}

.cat {
  height: 40px;
}

/* ===== WELCOME ===== */
.welcome-box {
  margin: 15px;
  border-radius: 15px;
  overflow: hidden;
}

.welcome-box img {
  width: 100%;
  display: block;
}

/* ===== MENU ===== */
.menu {
  display: flex;
  justify-content: space-around;
  margin: 15px;
}

.menu button {
  padding: 10px 18px;
  border-radius: 20px;
  border: 2px solid #f49ab0;
  background: transparent;
  color: #f49ab0;
  font-weight: bold;
}

/* ===== SECTION TITLE ===== */
.title {
  font-size: 28px;
  font-weight: bold;
  margin: 20px 15px 10px;
  color: #6b5b5b;
}

/* ===== PORTFOLIO SLIDER ===== */
.slider {
  margin: 15px;
  border-radius: 15px;
  overflow: hidden;
}

.slider img {
  width: 100%;
  display: none;
}

.slider img.active {
  display: block;
}

/* ===== QUEUE ===== */
.queue-card {
  margin: 15px;
  padding: 20px;
  background: white;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(255,150,180,0.4);
  position: relative;
}

.queue-number {
  position: absolute;
  right: 10px;
  top: -10px;
  background: #f7e6a5;
  padding: 10px;
  border-radius: 5px;
  text-align: center;
}

.queue-number span {
  font-size: 24px;
  color: hotpink;
}

/* ===== PROGRESS BAR ===== */
.progress {
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

.progress-bar {
  height: 100%;
  width: 80%;
  background: linear-gradient(to right, #ff8fab, #8ec5ff);
}

</style>
</head>

<body>

<!-- ===== TOP BAR ===== -->
<div class="topbar">
  <img src="logokonamew.PNG" class="logo">
  <img src="logo cat.PNG" class="cat">
</div>

<!-- ===== WELCOME ===== -->
<div class="welcome-box">
  <img src="bgwelcome.PNG">
  <img src="welcome.PNG" style="position:absolute; left:25px; top:80px; width:150px;">
</div>

<!-- ===== MENU ===== -->
<div class="menu">
  <button>Home</button>
  <button>T.O.S</button>
  <button>Price</button>
  <button>Contact</button>
</div>

<!-- ===== PORTFOLIO ===== -->
<div class="title">Portfolio</div>

<div class="slider">
  <img src="P1.JPG" class="active">
  <img src="P2.JPG">
  <img src="P3.JPG">
  <img src="P4.JPG">
</div>

<!-- ===== QUEUE ===== -->
<div class="title">Queue</div>

<div class="queue-card">
  <div class="queue-number">
    Queue<br><span>1</span>
  </div>

  <h2>Client <span style="color:#f49ab0; font-size:14px;">Vgen</span></h2>
  <p>Service : head shot</p>
  <p style="color:#f49ab0;">Progress : done</p>

  <div class="progress">
    <div class="progress-bar"></div>
  </div>
</div>

<!-- ===== SCRIPT (AUTO SLIDE) ===== -->
<script>
let index = 0;
const slides = document.querySelectorAll(".slider img");

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 2500);
</script>

</body>
</html>
