<!DOCTYPE html>
<html>
<head>
  <title>Konamew</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f6f3f4;
    }

    /* HEADER */
    .header {
      background: #d88a9a;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      height: 45px;
    }

    .cat {
      height: 35px;
    }

    /* WELCOME */
    .welcome-box {
      margin: 15px;
      border-radius: 15px;
      overflow: hidden;
      position: relative;
    }

    .welcome-bg {
      width: 100%;
      display: block;
    }

    .welcome-text {
      position: absolute;
      top: 10px;
      left: 15px;
      width: 200px;
    }

    /* MENU */
    .menu {
      display: flex;
      justify-content: space-around;
      margin: 10px 10px 20px;
    }

    .menu button {
      border: 2px solid #e3a3b0;
      background: transparent;
      border-radius: 20px;
      padding: 8px 16px;
      color: #c97c8f;
      font-weight: bold;
    }

    /* TITLE */
    h2 {
      margin: 15px;
      color: #6e5c60;
    }

    /* 🔥 SLIDER FIX (ไม่กระโดด) */
    .slider {
      margin: 15px;
      border-radius: 15px;
      overflow: hidden;
      height: 250px;
      position: relative;
    }

    .slider img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .slider img.active {
      opacity: 1;
    }

    /* QUEUE CARD */
    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255, 170, 190, 0.4);
      position: relative;
    }

    .badge {
      position: absolute;
      right: 10px;
      top: -10px;
      background: #e9d99c;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .badge span {
      font-size: 20px;
      color: #ff6fa0;
    }

    .progress {
      height: 10px;
      background: #ddd;
      border-radius: 10px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 70%;
      background: linear-gradient(to right, #f48ca8, #8db5e5);
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <img src="logokonamew.PNG" class="logo">
    <img src="logocat.PNG" class="cat">
  </div>

  <!-- WELCOME -->
  <div class="welcome-box">
    <img src="bgwelcome.PNG" class="welcome-bg">
    <img src="welcome.PNG" class="welcome-text">
  </div>

  <!-- MENU -->
  <div class="menu">
    <button>Home</button>
    <button>T.O.S</button>
    <button>Price</button>
    <button>Contact</button>
  </div>

  <!-- PORTFOLIO -->
  <h2>Portfolio</h2>

  <div class="slider">
    <img src="P1.JPG" class="active">
    <img src="P2.JPG">
    <img src="P3.JPG">
    <img src="P4.JPG">
  </div>

  <!-- QUEUE -->
  <h2>Queue</h2>

  <div class="card">
    <div class="badge">
      Queue<br><span>1</span>
    </div>

    <h3>Client <span style="color:#e3a3b0;">Vgen</span></h3>
    <p>Service : head shot</p>
    <p style="color:#e3a3b0;">Progress : done</p>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>
  </div>

  <!-- AUTO SLIDE -->
  <script>
    let slides = document.querySelectorAll(".slider img");
    let index = 0;

    setInterval(() => {
      slides[index].classList.remove("active");
      index = (index + 1) % slides.length;
      slides[index].classList.add("active");
    }, 3000);
  </script>

</body>
</html>
