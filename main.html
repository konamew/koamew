<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>konamew</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background: linear-gradient(#fff7fa,#ffeef5);
  display:flex;
  justify-content:center;
}

/* container */
.container{
  width:100%;
  max-width:420px;
  padding:15px;
}

/* header */
.header{
  background:#d98194;
  border-radius:20px;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 8px 25px rgba(255,182,193,0.4);
}

.header img{height:40px;}

/* welcome */
.welcome img{
  width:100%;
  border-radius:20px;
  margin-top:15px;
  box-shadow:0 10px 30px rgba(255,182,193,0.4);
}

/* menu */
.menu{
  display:flex;
  margin:15px 0;
}

.menu button{
  flex:1;
  margin:5px;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#fff;
  color:#d98194;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(255,182,193,0.25);
  transition:0.25s;
}

.menu button:hover{
  background: linear-gradient(135deg,#ffdbe5,#d6ecff);
  transform:translateY(-2px);
}

/* title */
.section-title{
  font-size:24px;
  font-weight:700;
  margin:20px 0 10px;
  color:#6b5b5b;
}

/* slider */
.slider{
  position:relative;
  height:260px;
  overflow:hidden;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(255,182,193,0.4);
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:0.5s;
}

.slide.active{opacity:1;}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  cursor:pointer;
}

/* nav */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:white;
  border:none;
  border-radius:50%;
  width:35px;
  height:35px;
}

.prev{left:10px;}
.next{right:10px;}

/* queue */
.queue-card{
  position:relative;
  background:#fff;
  border-radius:20px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 8px 25px rgba(255,182,193,0.25);
}

.queue-badge{
  position:absolute;
  right:10px;
  top:10px;

  background: linear-gradient(135deg,#ffeaa7,#ffd6f1);
  border-radius:15px;
  padding:8px 12px;

  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.queue-badge span{
  display:block;
  font-size:12px;
  color:#7a6a6a;
}

.queue-badge b{
  font-size:22px;
  color:#ff6fa5;
}

.client{
  font-size:22px;
  font-weight:700;
}

/* progress */
.progress-bar{
  height:8px;
  background:#eaeaea;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress-fill{
  width:70%;
  height:100%;
  background: linear-gradient(90deg,#ff9eb5,#c9b6ff,#8ec5ff);
  border-radius:10px;
  position:relative;
  overflow:hidden;
}

.progress-fill::after{
  content:"";
  position:absolute;
  top:0;
  left:-60%;
  width:60%;
  height:100%;
  background: linear-gradient(120deg,transparent,rgba(255,255,255,0.8),transparent);
  animation: shimmer 2.5s infinite;
}

@keyframes shimmer{
  0%{ left:-60%; }
  100%{ left:120%; }
}

/* 🌙 POPUP FIX */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup img{
  max-width:90%;
  border-radius:20px;
}

/* ปุ่ม popup */
.popup-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:white;
  border:none;
  border-radius:50%;
  width:40px;
  height:40px;
  font-size:20px;
}

.popup-btn.left{ left:20px; }
.popup-btn.right{ right:20px; }

</style>
</head>

<body>

<div class="container">

<div class="header">
  <img src="logokonamew.PNG">
  <img src="logocat.PNG">
</div>

<div class="welcome">
  <img src="bgwelcome.PNG">
</div>

<div class="menu">
  <button>Home</button>
  <button>T.O.S</button>
  <button>Price</button>
  <button>Contact</button>
</div>

<div class="section-title">Portfolio</div>

<div class="slider">
  <div class="slide active"><img src="P1.JPG" onclick="openPopup(0)"></div>
  <div class="slide"><img src="P2.jpg" onclick="openPopup(1)"></div>
  <div class="slide"><img src="P3.JPG" onclick="openPopup(2)"></div>
  <div class="slide"><img src="P4.JPG" onclick="openPopup(3)"></div>

  <button class="nav prev" onclick="prev()">‹</button>
  <button class="nav next" onclick="next()">›</button>
</div>

<div class="section-title">Queue</div>

<div class="queue-card">
  <div class="queue-badge"><span>Queue</span><b>1</b></div>
  <h3 class="client">Client Vgen</h3>
  <p>Service : head shot</p>
  <p style="color:#e89aac;">Progress : done</p>

  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
</div>

</div>

<!-- popup -->
<div class="popup" id="popup">
  <button class="popup-btn left" onclick="popupPrev()">‹</button>
  <img id="popup-img">
  <button class="popup-btn right" onclick="popupNext()">›</button>
</div>

<script>

/* slider */
let index=0;
const slides=document.querySelectorAll(".slide");

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

function next(){ index=(index+1)%slides.length; showSlide(index);}
function prev(){ index=(index-1+slides.length)%slides.length; showSlide(index);}
setInterval(next,4000);

/* 💖 popup FIX */
let popupIndex=0;
const images=["P1.JPG","P2.jpg","P3.JPG","P4.JPG"];

function openPopup(i){
  popupIndex=i;
  document.getElementById("popup").style.display="flex";
  updatePopup();
}

function updatePopup(){
  document.getElementById("popup-img").src=images[popupIndex];
}

function popupNext(){
  popupIndex=(popupIndex+1)%images.length;
  updatePopup();
}

function popupPrev(){
  popupIndex=(popupIndex-1+images.length)%images.length;
  updatePopup();
}

/* ปิด popup */
document.getElementById("popup").addEventListener("click",(e)=>{
  if(e.target.id==="popup"){
    document.getElementById("popup").style.display="none";
  }
});

</script>

</body>
</html>
