<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>konamew</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background: linear-gradient(#fff7fa,#ffeef5);
  display:flex;
  justify-content:center;
}

/* container */
.container{
  width:100%;
  max-width:420px;
  padding:15px;
}

/* ❌ ลบ header + menu ออกหมดแล้ว */

/* title */
.section-title{
  font-size:24px;
  font-weight:700;
  margin:20px 0 10px;
  color:#6b5b5b;
}

/* slider */
.slider{
  position:relative;
  height:260px;
  overflow:hidden;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(255,182,193,0.4);
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:0.5s;
}

.slide.active{opacity:1;}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  cursor:pointer;
}

/* nav */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:white;
  border:none;
  border-radius:50%;
  width:35px;
  height:35px;
}

.prev{left:10px;}
.next{right:10px;}

/* queue */
.queue-card{
  position:relative;
  background:#fff;
  border-radius:20px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 8px 25px rgba(255,182,193,0.25);
  width:100%;
  box-sizing:border-box;
}
  .queue-card:hover{
  transform:translateY(-3px);
  transition:0.2s;
}


.queue-badge{
  position:absolute;
  right:10px;
  top:10px;
  background: linear-gradient(135deg,#ffeaa7,#ffd6f1);
  border-radius:15px;
  padding:8px 12px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.queue-badge span{
  display:block;
  font-size:12px;
  color:#7a6a6a;
}

.queue-badge b{
  font-size:22px;
  color:#ff6fa5;
}

.client{
  font-size:22px;
  font-weight:700;
}

/* progress */
.progress-bar{
  height:8px;
  background:#eaeaea;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress-fill{
  width:70%;
  height:100%;
  background: linear-gradient(90deg,#ff9eb5,#c9b6ff,#8ec5ff);
  border-radius:10px;
  position:relative;
  overflow:hidden;
}

.progress-fill::after{
  content:"";
  position:absolute;
  top:0;
  left:-60%;
  width:60%;
  height:100%;
  background: linear-gradient(120deg,transparent,rgba(255,255,255,0.8),transparent);
  animation: shimmer 2.5s infinite;
}

@keyframes shimmer{
  0%{ left:-60%; }
  100%{ left:120%; }
}

/* popup */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup img{
  max-width:90%;
  border-radius:20px;
}

.popup-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:white;
  border:none;
  border-radius:50%;
  width:40px;
  height:40px;
  font-size:20px;
}

.popup-btn.left{ left:20px; }
.popup-btn.right{ right:20px; }

.client span{
  color:#e89aac;
  font-size:13px;
  font-weight:400;
  background:#ffe4ec;
  padding:3px 8px;
  border-radius:10px;
  margin-left:8px;
  display:inline-block;
}

/* 🔥 TAB */
.tab{
  display:flex;
  gap:10px;
  margin:20px 0 15px; /* 👈 เพิ่มตรงนี้ */
  position:relative;
  z-index:10; /* 👈 กันโดนทับ */
}

.tab button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  background:rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  color:#e89aac;
  font-weight:600;
  box-shadow:0 5px 15px rgba(255,182,193,0.32);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}

/* 🔥 SLIDER QUEUE */
.slider-wrapper{
  overflow-x:hidden;
  overflow-y:visible;
  width:100%
}


.slider-pages{
  display:flex;
  width:200%;
  transition:0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.page{
  width:50%;
  flex-shrink:0;
  padding:5px; 
  box-sizing:border-box;
  height:70vh;
  overflow:auto;
  transition:opacity 0.3s;
}
  
  tab button.active{
  background: linear-gradient(135deg,#ffc6d6,#cdb4ff);
  color:white;
  transform:scale(1.05);
  box-shadow:0 8px 20px rgba(200,150,255,0.4);
}
.section-title{
  font-size:24px;
  font-weight:700;
  margin:25px 0 10px; /* 👈 เพิ่มระยะบน */
  color:#6b5b5b;
}
 .tab button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:25px;
  background:rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  color:#e89aac;
  font-weight:600;
  box-shadow:0 5px 15px rgba(255,182,193,0.2);
} 
.slider{
  position:relative;
  z-index:1;
}
 
 

  
</style>
</head>
  

<body>

<div class="container">

<!-- ✅ โหลด header -->
<div id="header"></div>

<div class="section-title">Portfolio</div>

<div class="slider">
  <div class="slide active"><img src="P1.JPG" onclick="openPopup(0)"></div>
  <div class="slide"><img src="P2.jpg" onclick="openPopup(1)"></div>
  <div class="slide"><img src="P3.JPG" onclick="openPopup(2)"></div>
  <div class="slide"><img src="P4.JPG" onclick="openPopup(3)"></div>

  <button class="nav prev" onclick="prev()">‹</button>
  <button class="nav next" onclick="next()">›</button>
</div>



<div class="tab">
  <button onclick="showQueue()">Queue</button>
  <button onclick="showDone()">Completed</button>
</div>

<div class="slider-wrapper">
  <div class="slider-pages">

    <div class="page">
      <div id="queue-container"></div>
    </div>

    <div class="page">
      <div id="done-container"></div>
    </div>

  </div>
</div>

<!-- popup -->
<div class="popup" id="popup">
  <button class="popup-btn left" onclick="popupPrev()">‹</button>
  <img id="popup-img">
  <button class="popup-btn right" onclick="popupNext()">›</button>
</div>

<script>
let index=0;
const slides=document.querySelectorAll(".slide");

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

function next(){ index=(index+1)%slides.length; showSlide(index);}
function prev(){ index=(index-1+slides.length)%slides.length; showSlide(index);}
setInterval(next,4000);

let popupIndex=0;
const images=["P1.JPG","P2.jpg","P3.JPG","P4.JPG"];

function openPopup(i){
  popupIndex=i;
  document.getElementById("popup").style.display="flex";
  updatePopup();
}

function updatePopup(){
  document.getElementById("popup-img").src=images[popupIndex];
}

function popupNext(){
  popupIndex=(popupIndex+1)%images.length;
  updatePopup();
}

function popupPrev(){
  popupIndex=(popupIndex-1+images.length)%images.length;
  updatePopup();
}

document.getElementById("popup").addEventListener("click",(e)=>{
  if(e.target.id==="popup"){
    document.getElementById("popup").style.display="none";
  }
});
</script>
<!-- 🔥 QUEUE SCRIPT -->
<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1aNycjooAEsNhnH5VMeukZvkU8Ddx6PGDWwNUwpcHQyQ/export?format=csv&gid=0";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1);

    const queueContainer = document.getElementById("queue-container");
    const doneContainer = document.getElementById("done-container");

queueContainer.innerHTML = "";
doneContainer.innerHTML = "";

    const firstRow = rows[0].split(",");
    const queueStatus = firstRow[8]?.trim().toLowerCase();

    if(queueStatus === "no"){
  queueContainer.innerHTML = "<p style='text-align:center;color:#999;'>Commission Closed</p>";
  return;
}
    rows.forEach((row, index) => {
      const cols = row.split(",");

      const name = cols[1];
      const service = cols[3];
      const status = cols[4];
      const progress = cols[5]*100;
      let color = "#ff9eb5";

  if(status === "sketch") color = "#a0c4ff";
  if(status === "lineart") color = "#a0c4ff";    
  if(status === "coloring") color = "#ffc6d6";    
  if(status === "detail") color = "#ffc6d6";
  if(status === "finish") color = "#b8f2e6";

      if(!name) return;
      if(status==="waiting")return;

      const card = `
        <div class="queue-card">

          <div class="queue-badge">
            <span>Queue</span>
            <b>${index+1}</b>
          </div>

          <h3 class="client">
            ${name} <span>${cols[2]}</span>
          </h3>

          <p>Service : ${service}</p>
          <p style="color:#e89aac;">staus : ${status}</p>

          <div class="progress-bar">
           <div class="progress-fill" style="width:${progress}%; background:${color};"></div>
          </div>

        </div>
      `;

     if(status === "finish"){
  doneContainer.innerHTML += card;
}else{
  queueContainer.innerHTML += card;
}
    });
  });
</script>
<!-- ✅ โหลด header -->
<script>
fetch("header.html")
.then(res => res.text())
.then(data => {
  document.getElementById("header").innerHTML = data;
});
</script>

 <script>
  // slider queue / completed
   function showQueue(){
  document.querySelector(".slider-pages").style.transform = "translateX(0%)";
  setActive(0);
}

function showDone(){
  document.querySelector(".slider-pages").style.transform = "translateX(-50%)";
  setActive(1);
}

function setActive(i){
  const btns = document.querySelectorAll(".tab button");
  btns.forEach(b=>b.classList.remove("active"));
  btns[i].classList.add("active");
}
 </script>
  
</body>
</html>
